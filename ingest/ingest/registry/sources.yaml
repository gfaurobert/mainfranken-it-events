# Quellen-Registry für die Mainfranken-IT-Events-Pipeline.
# type: ical | jsonld | confstech | html
# active:false = bekannte Quelle, aber aktuell nicht ingestierbar (leerer Feed,
#                JS/headless nötig, oder veraltet) — für späteres Re-Crawl/Headless.
# Der `verify`-Kommentar dokumentiert die letzte manuelle Verifikation (2026-06-25).
