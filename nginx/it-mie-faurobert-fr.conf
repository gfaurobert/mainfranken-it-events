# it.mie.faurobert.fr — Mainfranken IT Events demo website (static)
# Backend: pnpm demo → http://localhost:3456
#
# Deploy:
#   sudo ln -sf /home/gregoire/mainfranken-it-events/nginx/it-mie-faurobert-fr.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mie.faurobert.fr -d it.mie.faurobert.fr

server {
    server_name it.mie.faurobert.fr;

    access_log /var/log/nginx/it.mie.faurobert.fr.access.log;
    error_log /var/log/nginx/it.mie.faurobert.fr.error.log warn;

    client_max_body_size 10m;

    location / {
        proxy_pass http://localhost:3456;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mie.faurobert.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mie.faurobert.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = it.mie.faurobert.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name it.mie.faurobert.fr;
    return 404; # managed by Certbot


}