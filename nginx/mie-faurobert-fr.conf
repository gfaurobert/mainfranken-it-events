# mie.faurobert.fr — Mainfranken IT Events REST API + MCP (Streamable HTTP)
# Backend: pnpm dev / pnpm start (Fastify on PORT, default 3789)
#
# Deploy:
#   sudo ln -sf /home/gregoire/mainfranken-it-events/nginx/mie-faurobert-fr.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mie.faurobert.fr -d it.mie.faurobert.fr

upstream mainfranken_api {
    server 127.0.0.1:3789;
    keepalive 32;
}

server {
    server_name mie.faurobert.fr;

    access_log /var/log/nginx/mie.faurobert.fr.access.log;
    error_log /var/log/nginx/mie.faurobert.fr.error.log warn;

    client_max_body_size 1m;

    # MCP Streamable HTTP — disable buffering for streaming JSON-RPC responses
    location /mcp {
        proxy_pass http://mainfranken_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # REST API: /health, /events, /auth, /me/rsvps
    location / {
        proxy_pass http://mainfranken_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mie.faurobert.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mie.faurobert.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = mie.faurobert.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name mie.faurobert.fr;
    return 404; # managed by Certbot


}